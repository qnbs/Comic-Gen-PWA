name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1) Check out repository content
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2) Set up Node.js LTS with npm cache for faster installs
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      # 3) Install exact dependencies from lockfile
      - name: Install dependencies
        run: npm ci

      # 4) Build the Vite app for production
      - name: Build application
        run: npm run build

      # 5) Configure GitHub Pages for this workflow run
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # 6) Upload dist/ as the Pages deployment artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      # 7) Deploy uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
